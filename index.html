<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TVBox 统一网关</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .card { background: #fff; border-radius: 16px; padding: 40px; max-width: 500px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
    h1 { font-size: 24px; margin-bottom: 8px; color: #e74c3c; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
    .url-box { background: #f8f9fa; border: 2px dashed #ddd; border-radius: 10px; padding: 16px; margin: 16px 0; word-break: break-all; font-family: monospace; font-size: 14px; color: #333; }
    .url-box .label { display: block; font-size: 12px; color: #999; margin-bottom: 6px; text-align: left; }
    .status { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 13px; }
    .status.ok { background: #d4edda; color: #155724; }
    .status.warn { background: #fff3cd; color: #856404; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-left: 6px; }
    .badge.live { background: #dbeafe; color: #1e40af; }
    .badge.vod { background: #fce7f3; color: #9d174d; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📺 TVBox 统一网关</h1>
    <p class="subtitle">直播 + 点播，一个地址搞定</p>

    <div class="url-box">
      <span class="label">📋 TVBox 配置地址（复制到 TVBox APP）</span>
      <span id="tvboxUrl" style="color: #e74c3c; font-weight: bold;">加载中...</span>
    </div>

    <div id="statusArea">
      <span class="status warn">⏳ 检测中...</span>
    </div>
  </div>

  <script>
    const base = window.location.origin;
    const tvboxUrl = base + '/tvbox';
    document.getElementById('tvboxUrl').textContent = tvboxUrl;

    fetch(tvboxUrl)
      .then(r => r.json())
      .then(data => {
        const lives = data.lives?.length || 0;
        const sites = data.sites?.length || 0;
        if (lives > 0 && sites > 0) {
          document.getElementById('statusArea').innerHTML = `
            <span class="status ok">✅ 运行正常</span>
            <span class="badge live">📺 ${lives} 组直播</span>
            <span class="badge vod">🎬 ${sites} 个站点</span>
          `;
        } else if (lives > 0) {
          document.getElementById('statusArea').innerHTML = `
            <span class="status warn">⚠️ 仅有直播源 (${lives} 组)</span>
          `;
        } else if (sites > 0) {
          document.getElementById('statusArea').innerHTML = `
            <span class="status warn">⚠️ 仅有点播源 (${sites} 个站点)</span>
          `;
        } else {
          document.getElementById('statusArea').innerHTML = `
            <span class="status warn">⚠️ 暂无数据，请检查源地址配置</span>
          `;
        }
      })
      .catch(() => {
        document.getElementById('statusArea').innerHTML = `
          <span class="status warn">❌ 请求失败</span>
        `;
      });
  </script>
</body>
</html>
